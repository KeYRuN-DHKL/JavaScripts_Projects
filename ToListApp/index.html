<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Todo List</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="bg-blue-600 px-8 py-6">
            <h1 class="text-2xl font-bold text-white tracking-wide text-center">
                My Todo List
            </h1>
            <!-- Task Counter -->
            <p class="text-blue-200 text-sm text-center mt-1">
                <span id="taskCounter">0</span> tasks remaining
            </p>
        </div>

        <div class="p-6 flex flex-col gap-4">

            <!-- Input Row -->
            <div class="flex gap-2">
                <input
                    id="taskInput"
                    type="text"
                    placeholder="Add a new task..."
                    maxlength="100"
                    class="flex-1 px-4 py-3 border border-gray-300 rounded-lg
                           text-gray-700 focus:outline-none focus:ring-2
                           focus:ring-blue-500 focus:border-transparent
                           transition duration-300"
                />
                <button
                    id="addBtn"
                    class="bg-blue-600 text-white px-4 py-3 rounded-lg
                           font-bold text-xl hover:bg-blue-700 active:scale-95
                           transition duration-300">
                    +
                </button>
            </div>

            <!-- Error Message -->
            <p id="inputError"
               class="hidden text-red-500 text-xs font-semibold -mt-2">
                Please enter a task!
            </p>

            <!-- Filter Buttons -->
            <div class="flex gap-7">
                <button data-filter="all"
                    class="filter-btn flex-1 py-2 rounded-lg text-sm font-semibold
                           bg-blue-600 text-white transition duration-300">
                    All
                </button>
                <button data-filter="active"
                    class="filter-btn flex-1 py-2 rounded-lg text-sm font-semibold
                           border-2 border-gray-200 text-gray-500
                           hover:border-blue-600 hover:text-blue-600
                           transition duration-300">
                    Active
                </button>
                <button data-filter="completed"
                    class="filter-btn flex-1 py-2 rounded-lg text-sm font-semibold
                           border-2 border-gray-200 text-gray-500
                           hover:border-blue-600 hover:text-blue-600
                           transition duration-300">
                    Completed
                </button>
            </div>

            <!-- Task List -->
            <div id="taskList" class="flex flex-col gap-2 max-h-80 overflow-y-auto">
            </div>

            <!-- Empty State -->
            <div id="emptyState"
                 class="flex flex-col items-center justify-center py-8 gap-2">
                <span class="text-5xl">📝</span>
                <p class="text-gray-400 font-semibold">No tasks yet!</p>
                <p class="text-gray-300 text-sm">Add a task above to get started</p>
            </div>

            <!-- Footer -->
            <div class="flex items-center justify-between pt-2
                        border-t p-3 border-gray-200">
                <p class="text-gray-400 text-xs">
                    <span id="completedCount">0</span> of
                    <span id="totalCount">0</span> completed
                </p>
                <button
                    id="clearDoneBtn"
                    class="bg-blue-600 px-2 py-2 rounded-lg text-xs text-white font-semibold
                           hover:bg-blue-700 transition duration-300">
                    Clear Completed
                </button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
