<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Character Counter</title>
  </head>
  <body class="bg-gray-200 min-h-screen flex items-center justify-center p-4">
    <!-- Card -->
    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden">
      <!-- Header -->
      <div class="bg-blue-600 px-8 py-6">
        <h1 class="text-2xl font-bold text-white tracking-wide text-center">
          Character Counter
        </h1>
      </div>

      <div class="p-5 flex flex-col gap-6">
        <!-- Textarea -->
        <div class="flex flex-col gap-2">
          <textarea
            id="textarea"
            maxlength="200"
            rows="6"
            placeholder="Enter your text here..."
            class="w-full px-4 py-3 font-italic border border-gray-300 rounded-lg text-gray-700 placeholder:italic placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-300"
          ></textarea>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-3 gap-4">
          <!-- Characters -->
          <div
            class="flex flex-col items-center bg-blue-50 rounded-xl p-4 border border-blue-100"
          >
            <span id="charCount" class="text-3xl font-bold text-blue-600">
              0
            </span>
            <span
              class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-1"
            >
              Characters
            </span>
          </div>

          <!-- Words -->
          <div
            class="flex flex-col items-center bg-blue-50 rounded-xl p-4 border border-blue-100"
          >
            <span id="wordCount" class="text-3xl font-bold text-blue-600">
              0
            </span>
            <span
              class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-1"
            >
              Words
            </span>
          </div>

          <!-- Sentences -->
          <div
            class="flex flex-col items-center bg-blue-50 rounded-xl p-4 border border-blue-100"
          >
            <span id="sentenceCount" class="text-3xl font-bold text-blue-600">
              0
            </span>
            <span
              class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-1"
            >
              Sentences
            </span>
          </div>
        </div>

        <!-- Progress Bar -->
        <div class="flex flex-col gap-2">
          <!-- Label Row -->
          <div class="flex items-center justify-between">
            <span class="text-sm font-semibold text-gray-500">
              Character Limit
            </span>
            <span id="percentage" class="text-sm font-bold text-gray-600">
              0 / 200
            </span>
          </div>

          <!-- Track -->
          <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
            <!-- Bar -->
            <div
              id="progressBar"
              class="bg-green-500 h-4 rounded-full transition-all duration-300"
              style="width: 0%"
            ></div>
          </div>

          <!-- Warning Message -->
          <p
            id="limitWarning"
            class="text-red-500 text-xs font-semibold hidden"
          >
            ⚠️ You have reached the character limit!
          </p>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4">
          <!-- Copy -->
          <button
            id="copy"
            class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 active:scale-95 transition duration-300"
          >
            Copy
          </button>

          <!-- Clear -->
          <button
            id="clear"
            class="flex-1 border-2 border-gray-300 text-gray-500 py-3 rounded-lg font-semibold hover:border-red-400 hover:text-red-400 active:scale-95 transition duration-300"
          >
            Clear
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
