<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Counter App</title>
  </head>
  <body class="bg-gray-200">
    <div class="flex h-screen items-center justify-center">
      <div
        class="flex flex-col items-center justify-between bg-white w-1/2 h-1/2 md:w-1/2 h-1/2 rounded-xl shadow-lg p-8 gap-8"
      >
        <div class="flex flex-row w-full h-1/4 rounded-lg p-4 items-center justify-center bg-blue-500 text-2xl font-bold text-gray-700 tracking-wide text-white">
          MY COUNTER
        </div>

        <p
          id="count"
          class="text-7xl font-bold text-gray-800 transition duration-300"
        >
          0
        </p>

        <div class="flex items-center gap-10">
          <!-- Decrement -->
          <button
            id="decrement"
            class="bg-red-500 text-white w-16 h-12 rounded-lg text-2xl font-bold hover:bg-red-600 active:scale-95 transition duration-300"
          >
            −
          </button>

          <!-- Reset -->
          <button
            id="reset"
            class="bg-gray-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-gray-600 active:scale-95 transition duration-300"
          >
            Reset
          </button>

          <!-- Increment -->
          <button
            id="increment"
            class="bg-green-500 text-white w-16 h-12 rounded-lg text-2xl font-bold hover:bg-green-600 active:scale-95 transition duration-300"
          >
            +
          </button>
        </div>
      </div>
    </div>
    <script src="counter.js"></script>
  </body>
</html>
