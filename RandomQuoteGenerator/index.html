<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Random Quote Generator</title>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center p-4">

    <!-- Card -->
    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="bg-blue-600 px-8 py-6">
            <h1 class="text-2xl font-bold text-white tracking-wide text-center">
                Quote Generator
            </h1>
        </div>

        <div class="p-8 flex flex-col gap-6">

            <!-- Quote Card -->
            <div id="quoteCard"
                 class="flex flex-col gap-4 bg-blue-50 rounded-xl p-6
                        border border-blue-100 transition-opacity duration-300">

                <!-- Decorative Quote Mark -->
                <span class="text-6xl font-bold text-blue-200 leading-none">
                    "
                </span>

                <!-- Quote Text -->
                <p id="quoteText"
                   class="text-gray-700 text-lg font-medium italic leading-relaxed">
                    Click New Quote to get started
                </p>

                <!-- Quote Author -->
                <p id="quoteAuthor"
                   class="text-blue-500 font-semibold text-right">
                    — Unknown
                </p>

                <!-- Quote Category -->
                <span id="quoteCategory"
                      class="self-start bg-blue-100 text-blue-600 text-xs
                             font-semibold px-3 py-1 rounded-full uppercase tracking-wide">
                    general
                </span>

            </div>

            <!-- Action Buttons -->
            <div class="flex gap-4">

                <!-- New Quote -->
                <button id="generator"
                    class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold
                           hover:bg-blue-700 active:scale-95 transition duration-300">
                    New Quote
                </button>

                <!-- Copy -->
                <button id="copy"
                    class="flex-1 border-2 border-blue-600 text-blue-600 py-3
                           rounded-lg font-semibold hover:bg-blue-600 hover:text-white
                           active:scale-95 transition duration-300">
                    Copy
                </button>

            </div>

            <!-- Category Filters -->
            <div class="flex flex-wrap justify-evenly">

                <button data-category="all"
                    class="category px-4 py-2 rounded-full text-sm font-semibold
                           border-2 border-blue-600 text-blue-600
                           hover:bg-blue-600 hover:text-white transition duration-300">
                    All
                </button>

                <button data-category="tech"
                    class="category px-4 py-2 rounded-full text-sm font-semibold
                           border-2 border-blue-600 text-blue-600
                           hover:bg-blue-600 hover:text-white transition duration-300">
                    Tech
                </button>

                <button data-category="sports"
                    class="category px-4 py-2 rounded-full text-sm font-semibold
                           border-2 border-blue-600 text-blue-600
                           hover:bg-blue-600 hover:text-white transition duration-300">
                    Sports
                </button>

                <button data-category="politics"
                    class="category px-4 py-2 rounded-full text-sm font-semibold
                           border-2 border-blue-600 text-blue-600
                           hover:bg-blue-600 hover:text-white transition duration-300">
                    Politics
                </button>

                   <button data-category="business"
                    class="category px-4 py-2 rounded-full text-sm font-semibold
                           border-2 border-blue-600 text-blue-600
                           hover:bg-blue-600 hover:text-white transition duration-300">
                    Business
                </button>

                <button data-category="love"
                    class="category px-4 py-2 rounded-full text-sm font-semibold
                           border-2 border-blue-600 text-blue-600
                           hover:bg-blue-600 hover:text-white transition duration-300">
                    Love
                </button>

            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
